# chart-releaser (cr) configuration, consumed by helm/chart-releaser-action.
#
# Use a per-chart release-notes.md (generated by scripts/render-release-notes.sh
# before the release step) as the GitHub Release body. Without this, cr falls
# back to the chart `description`, so Renovate shows no real changelog in
# downstream consumer PRs. The file is read from the packaged chart, so it must
# live in the chart directory and not be excluded by .helmignore.
release-notes-file: release-notes.md
