name: Release Charts

on:
  push:
    tags:
      - "*-[0-9]*.[0-9]*.[0-9]*"
  workflow_call:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.0

      - name: Add Helm repositories and build dependencies
        run: |
          for chart_dir in charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue

            echo "Processing dependencies for $chart_dir"

            yq '.dependencies[].repository | select(. != null)' "$chart_dir/Chart.yaml" | sort -u | while read -r repo_url; do
              [ -z "$repo_url" ] && continue
              # Generate a stable repo name from the URL
              repo_name=$(echo "$repo_url" | sed 's|[^a-zA-Z0-9]|-|g')
              helm repo add "$repo_name" "$repo_url" 2>/dev/null || true
            done

            helm dependency build "$chart_dir"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update gh-pages with index page
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_OWNER="${GITHUB_REPOSITORY%/*}"

          # Switch to gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Remove any leftover charts directory from gh-pages
          rm -rf charts 2>/dev/null || true

          # Create a generic index.html for the Helm repository
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Helm Charts - ${REPO_OWNER}</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      max-width: 800px;
                      margin: 50px auto;
                      padding: 20px;
                      line-height: 1.6;
                  }
                  code {
                      background: #f4f4f4;
                      padding: 2px 6px;
                      border-radius: 3px;
                      font-family: "Monaco", "Courier New", monospace;
                  }
                  pre {
                      background: #f4f4f4;
                      padding: 15px;
                      border-radius: 5px;
                      overflow-x: auto;
                  }
                  h1, h2 { color: #0082c9; }
                  a { color: #0082c9; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Helm Charts</h1>

              <p>Helm chart repository hosted on GitHub Pages.</p>

              <h2>Usage</h2>

              <p>Add the Helm repository:</p>
              <pre><code>helm repo add ${REPO_NAME} https://${REPO_OWNER}.github.io/${REPO_NAME}/
          helm repo update</code></pre>

              <p>Search for available charts:</p>
              <pre><code>helm search repo ${REPO_NAME}/</code></pre>

              <h2>Resources</h2>

              <ul>
                  <li><a href="https://github.com/${REPO_OWNER}/${REPO_NAME}">GitHub Repository</a> - Source code and issues</li>
                  <li><a href="index.yaml">Helm Repository Index</a> - Chart metadata</li>
              </ul>

              <hr>
              <p><small>Generated by <a href="https://github.com/helm/chart-releaser">chart-releaser</a></small></p>
          </body>
          </html>
          EOF

          # Commit changes
          git add index.html
          git rm -rf charts 2>/dev/null || true
          git commit -m "Update index page from chart release" || echo "No changes to commit"
          git push origin gh-pages
