apiVersion: v2
name: nextcloud-mcp-server
description: A Helm chart for deploying Nextcloud MCP Server - enables AI assistants to interact with Nextcloud
type: application
version: 0.59.1
appVersion: "0.70.0"
keywords:
  - nextcloud
  - mcp
  - model-context-protocol
  - llm
  - ai
  - claude
  - webdav
  - caldav
  - carddav
  - helm
maintainers:
  - name: Chris Coutinho
    email: chris@coutinho.io
home: https://github.com/cbcoutinho/nextcloud-mcp-server
sources:
  - https://github.com/cbcoutinho/nextcloud-mcp-server
icon: https://raw.githubusercontent.com/nextcloud/server/master/core/img/logo/logo.svg
annotations:
  # Grafana dashboard support
  grafana_dashboard: "true"
  grafana_dashboard_folder: "Nextcloud MCP"
  artifacthub.io/changes: |
    - kind: changed
      description: "add helm keyword to chart metadata"
    - kind: fixed
      description: "use yq syntax compatible with GitHub Actions runner"
dependencies:
  - name: qdrant
    version: "1.17.1"
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.networkMode.deploySubchart
  - name: ollama
    version: "1.54.0"
    repository: https://otwld.github.io/ollama-helm
    condition: ollama.enabled
