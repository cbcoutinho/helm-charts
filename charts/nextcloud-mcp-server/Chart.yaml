apiVersion: v2
name: nextcloud-mcp-server
description: A Helm chart for deploying Nextcloud MCP Server - enables AI assistants to interact with Nextcloud
type: application
version: 0.84.0
appVersion: "0.120.3"
keywords:
  - nextcloud
  - mcp
  - model-context-protocol
  - llm
  - ai
  - claude
  - webdav
  - caldav
  - carddav
  - helm
maintainers:
  - name: Chris Coutinho
    email: chris@coutinho.io
home: https://github.com/cbcoutinho/nextcloud-mcp-server
sources:
  - https://github.com/cbcoutinho/nextcloud-mcp-server
icon: https://raw.githubusercontent.com/nextcloud/server/master/core/img/logo/logo.svg
annotations:
  # Grafana dashboard support
  grafana_dashboard: "true"
  grafana_dashboard_folder: "Nextcloud MCP"
  artifacthub.io/changes: |
    - kind: added
      description: "expose documentPipeline.glyphCorruptionRatio (DOCUMENT_GLYPH_CORRUPTION_RATIO): tier-0 glyph-corruption -> structured escalation"
    - kind: changed
      description: "update ghcr.io/cbcoutinho/nextcloud-mcp-server docker tag to v0.120.3"
    - kind: changed
      description: "update anthropics/claude-code-action action to v1.0.149"
    - kind: fixed
      description: "raw-output on annotation read; harden yq load_str path"
    - kind: fixed
      description: "use yq --raw-output when rendering release notes"
    - kind: fixed
      description: "harden release-notes rendering and document .helmignore constraint"
    - kind: added
      description: "surface chart changelog in GitHub Release notes"
    - kind: changed
      description: "update anthropics/claude-code-action action to v1.0.148"
dependencies:
  - name: qdrant
    version: "1.18.2"
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.networkMode.deploySubchart
  - name: ollama
    version: "1.61.0"
    repository: https://otwld.github.io/ollama-helm
    condition: ollama.enabled
