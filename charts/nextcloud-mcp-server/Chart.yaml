apiVersion: v2
name: nextcloud-mcp-server
description: A Helm chart for deploying Nextcloud MCP Server - enables AI assistants to interact with Nextcloud
type: application
version: 0.98.0
appVersion: "0.141.0"
# policy/v1 (PodDisruptionBudget) was promoted in Kubernetes 1.21.
kubeVersion: ">=1.21.0-0"
keywords:
  - nextcloud
  - mcp
  - model-context-protocol
  - llm
  - ai
  - claude
  - webdav
  - caldav
  - carddav
  - helm
maintainers:
  - name: Chris Coutinho
    email: chris@coutinho.io
home: https://github.com/cbcoutinho/nextcloud-mcp-server
sources:
  - https://github.com/cbcoutinho/nextcloud-mcp-server
icon: https://raw.githubusercontent.com/nextcloud/server/master/core/img/logo/logo.svg
annotations:
  # Grafana dashboard support
  grafana_dashboard: "true"
  grafana_dashboard_folder: "Nextcloud MCP"
  artifacthub.io/changes: |
    - kind: fixed
      description: "treat /tmp as a normal coverage candidate in validateSpoolDir"
    - kind: fixed
      description: "make the spoolDir mount check path-boundary aware"
    - kind: fixed
      description: "fail fast when spoolDir has no writable volume behind it"
    - kind: fixed
      description: "bound the API pod's spool volume too, and correct the quantity pattern"
    - kind: added
      description: "expose ingest spool settings and bound the worker's tmp volume"
dependencies:
  - name: qdrant
    version: "1.18.2"
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.networkMode.deploySubchart
  - name: ollama
    version: "1.67.0"
    repository: https://otwld.github.io/ollama-helm
    condition: ollama.enabled
