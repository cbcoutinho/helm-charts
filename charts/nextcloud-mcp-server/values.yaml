# Default values for nextcloud-mcp-server
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas
replicaCount: 1

# Deployment update strategy (spec.strategy). Default `Recreate` keeps the
# single-replica default safe — only ever one Pod, so no risk of two concurrent
# backends during a rollout, and no surge capacity needed. Override with
# RollingUpdate + maxUnavailable: 0 / maxSurge: 1 for "created before deleted"
# zero-downtime rollouts (the replacement Pod comes up Ready before the old one
# is removed) when the workload tolerates a brief 2-Pod overlap — the backend is
# horizontally scalable (see autoscaling/HPA below), so this is safe; Recreate
# is just the conservative default. Pairs with podDisruptionBudget.maxUnavailable
# to let node drains/consolidation proceed gracefully. Example:
#   strategy:
#     type: RollingUpdate
#     rollingUpdate:
#       maxUnavailable: 0
#       maxSurge: 1
strategy:
  type: Recreate

image:
  repository: ghcr.io/cbcoutinho/nextcloud-mcp-server
  pullPolicy: IfNotPresent
  # Image tag is automatically set to chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Nextcloud connection settings
nextcloud:
  # URL of your Nextcloud instance (required)
  # Example: https://cloud.example.com
  host: ""

  # MCP server URL for OAuth callbacks (OAuth mode only)
  # If not specified, will be constructed from ingress.hosts[0] if ingress is enabled,
  # or defaults to http://localhost:8000 (suitable for port-forward setups)
  # Example: https://mcp.example.com
  mcpServerUrl: ""

  # Public issuer URL for browser-accessible OAuth authorization endpoints (OAuth mode only)
  # ONLY used to make authorization endpoints accessible to users' browsers
  # All server-to-server communication (token endpoint, JWKS, introspection, userinfo)
  # uses URLs from OIDC discovery without any rewriting
  #
  # Use case: When MCP server accesses Nextcloud at one URL but browsers need a different
  # public URL for OAuth login (e.g., server uses internal DNS, browsers use public domain)
  #
  # If not specified, defaults to nextcloud.host (works when MCP server and browsers
  # both access Nextcloud at the same URL)
  # Example: https://cloud.example.com
  publicIssuerUrl: ""

  # Verify TLS certificates when connecting to Nextcloud (NEXTCLOUD_VERIFY_SSL).
  # Set to false only for self-signed certs in trusted networks.
  # Must be a bare YAML bool (true/false), NOT a quoted string — a quoted "false"
  # is truthy in Go templates and would silently leave NEXTCLOUD_VERIFY_SSL unset
  # (app default: verify).
  verifySsl: true
  # In-container path to a PEM CA bundle for a private CA (NEXTCLOUD_CA_BUNDLE).
  # The chart only sets the env var — mount the file yourself via the top-level
  # `volumes` / `volumeMounts`.
  # Example: /etc/ssl/nextcloud-ca.crt
  caBundle: ""

# Authentication configuration
# Choose one mode: "basic", "multi-user-basic", "oauth", or "login-flow"
auth:
  # Authentication mode: "basic", "multi-user-basic", "oauth", or "login-flow"
  # basic: Single-user with username/password (recommended for personal use)
  # multi-user-basic: Multi-user with BasicAuth pass-through (credentials in request headers)
  # oauth: Uses OAuth2/OIDC (experimental, requires patches)
  # login-flow: Multi-user via Nextcloud Login Flow v2 (experimental, ADR-022)
  mode: basic

  # Shared OIDC configuration. Applies regardless of auth.mode and is
  # surfaced unchanged via the MCP server's GET /api/v1/status response
  # (under `oidc.discovery_url`). Astrolabe and other MCP clients consume
  # that field to skip their own localhost-based discovery fallback —
  # critical when the MCP client (e.g. an Astrolabe Nextcloud app) runs
  # on a managed Nextcloud that has no local Apache to curl into.
  oidc:
    # Full OpenID Connect discovery URL of the OIDC provider this MCP
    # server delegates to. Leave empty if the MCP server's downstream
    # IdP is the same Nextcloud the MCP client already talks to and you
    # are happy for clients to construct the discovery URL themselves.
    # Example: "https://cloud.example.com/index.php/apps/oidc/.well-known/openid-configuration"
    # Maps to the OIDC_DISCOVERY_URL env var read by the MCP server.
    discoveryUrl: ""

  # Basic authentication settings (single-user mode)
  basic:
    # Nextcloud username (ignored if existingSecret is set)
    username: ""
    # Nextcloud password or app password (recommended) (ignored if existingSecret is set)
    password: ""
    # Use existing secret instead of creating one
    # If set, username and password above are ignored
    # Secret must contain keys specified in usernameKey and passwordKey
    # Example:
    #   kubectl create secret generic my-nextcloud-creds \
    #     --from-literal=username=myuser \
    #     --from-literal=password=mypassword
    existingSecret: ""
    # Keys in the existing secret
    usernameKey: "username"
    passwordKey: "password"

  # Multi-user BasicAuth settings (pass-through mode)
  # Users provide credentials in request headers (Authorization: Basic ...)
  # Server optionally stores app passwords for background operations
  multiUserBasic:
    # Enable offline access (background operations using app passwords via Astrolabe)
    # When enabled, requires token encryption key. OAuth client credentials are optional (uses DCR if not provided)
    enableOfflineAccess: false
    # Token encryption key (required if enableOfflineAccess: true, ignored if existingSecret is set)
    # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    tokenEncryptionKey: ""
    # Token storage database path
    tokenStorageDb: "/app/data/tokens.db"
    # OAuth client credentials (optional - uses Dynamic Client Registration if not provided)
    # Only needed if enableOfflineAccess: true
    clientId: ""
    clientSecret: ""
    # OAuth scopes to request (space-separated). Dot separator is the
    # canonical form for IDP compatibility — Cognito's resource-server
    # `scope_name` charset rejects `:`, and the upstream nextcloud-mcp-
    # server migrated all internal scope storage to `.` in the
    # 20260407_1200_004_migrate_scope_separator alembic revision.
    scopes: "openid profile email offline_access notes.read notes.write calendar.read calendar.write contacts.read contacts.write cookbook.read cookbook.write deck.read deck.write tables.read tables.write files.read files.write sharing.read sharing.write todo.read todo.write"
    # Use existing secret for multi-user basic auth credentials
    # If set, tokenEncryptionKey, clientId, and clientSecret above are ignored
    # Secret should contain keys specified in the *Key fields below
    # Example:
    #   kubectl create secret generic my-multiuser-creds \
    #     --from-literal=token_encryption_key=ESF1BvEQ... \
    #     --from-literal=client_id=my-client-id \
    #     --from-literal=client_secret=my-client-secret
    existingSecret: ""
    # Keys in the existing secret
    tokenEncryptionKeyKey: "token_encryption_key"
    clientIdKey: "client_id"
    clientSecretKey: "client_secret"
    # Persistent storage for token database
    persistence:
      enabled: true
      # Storage class (leave empty for default)
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 100Mi
      # Use existing PVC
      existingClaim: ""

  # OAuth2/OIDC settings (experimental)
  oauth:
    # OAuth token type: "jwt" or "opaque"
    tokenType: "jwt"
    # Pre-registered OAuth client ID (optional, ignored if existingSecret is set)
    # If not provided and no existingSecret, will use Dynamic Client Registration (DCR)
    clientId: ""
    # Pre-registered OAuth client secret (optional, ignored if existingSecret is set)
    clientSecret: ""
    # OAuth scopes to request (space-separated). Dot separator is the
    # canonical form — see comment on the multiuser block above for
    # context.
    scopes: "openid profile email notes.read notes.write calendar.read calendar.write contacts.read contacts.write cookbook.read cookbook.write deck.read deck.write tables.read tables.write files.read files.write sharing.read sharing.write todo.read todo.write"
    # Use existing secret for OAuth client credentials
    # If set, clientId and clientSecret above are ignored
    # Secret must contain keys specified in clientIdKey and clientSecretKey
    # Example:
    #   kubectl create secret generic my-oauth-creds \
    #     --from-literal=clientId=my-client-id \
    #     --from-literal=clientSecret=my-client-secret
    existingSecret: ""
    # Keys in the existing secret
    clientIdKey: "clientId"
    clientSecretKey: "clientSecret"
    # Persistent storage for OAuth client credentials
    persistence:
      enabled: true
      # Storage class (leave empty for default)
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 100Mi
      # Use existing PVC
      existingClaim: ""

  # Login Flow v2 settings (experimental, ADR-022)
  # Uses Nextcloud's native Login Flow v2 to obtain app passwords per user.
  # No OAuth patches required — works with stock Nextcloud.
  # See: docs/ADR-022-deployment-mode-consolidation.md
  loginFlow:
    # Token encryption key (required, ignored if existingSecret is set)
    # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    tokenEncryptionKey: ""
    # Token storage database path
    tokenStorageDb: "/app/data/tokens.db"
    # Use existing secret instead of creating one
    existingSecret: ""
    # Key in the existing secret
    tokenEncryptionKeyKey: "token_encryption_key"
    # OIDC client credentials. Login-flow mode authenticates the MCP
    # client ↔ MCP server leg via OAuth/OIDC against the customer's
    # Nextcloud, so NEXTCLOUD_OIDC_CLIENT_ID / _SECRET are required
    # whenever the OIDC provider doesn't support Dynamic Client
    # Registration. Provide either inline (clientId / clientSecret —
    # rendered into the same Secret as tokenEncryptionKey) or via an
    # existing Secret (oidcExistingSecret — falls back to
    # `existingSecret` above when unset, so a single Secret can hold
    # both keys).
    clientId: ""
    clientSecret: ""
    # When set, OIDC client creds are read from this Secret instead
    # of `existingSecret`. Useful when token-encryption-key and OIDC
    # creds are provisioned by different controllers (e.g., one ESO
    # ExternalSecret per upstream source).
    oidcExistingSecret: ""
    clientIdKey: "client_id"
    clientSecretKey: "client_secret"
    # Persistent storage for Login Flow v2 / OAuth client registration data
    # mounted at /app/.oauth. Required for SQLite-backed deployments;
    # safe to set `enabled: false` when `database.url` /
    # `database.existingSecret` is configured (the MCP server then
    # writes OAuth client registrations to the database, ADR-026).
    persistence:
      enabled: true
      # Storage class (leave empty for default)
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 100Mi
      # Use existing PVC
      existingClaim: ""

# Data Storage Configuration
# Persistent volume for /app/data directory
# Used for: token databases, qdrant persistent storage, and any app data
# When disabled, uses emptyDir (non-persistent, but still writable)
#
# Tip: when `database.url` or `database.existingSecret` is set the MCP
# server points at a centralized DB and no longer needs a PVC for token
# storage. The chart auto-suppresses the data-storage PVC in that case
# even when `auth.mode` is `login-flow` / `multi-user-basic` (which
# would otherwise force it on). Explicitly set `dataStorage.enabled:
# true` to override — useful if Qdrant persistent mode or another
# consumer still needs /app/data.
dataStorage:
  # Enable persistent storage for /app/data
  # Set to true when using:
  # - Multi-user basic auth with offline access (stores tokens.db)
  # - Login flow mode (stores app passwords in tokens.db)
  # - Qdrant persistent mode (stores vector database)
  # - Any feature requiring persistent app data
  # Set to false for basic auth without persistence (uses emptyDir),
  # or when delegating token storage to `database` below — the chart
  # also auto-skips this PVC when `database.*` is configured.
  enabled: false
  # Storage class (leave empty for default)
  storageClass: ""
  accessMode: ReadWriteOnce
  # Size for data storage (should accommodate tokens.db and/or qdrant data)
  # Recommended: 1Gi minimum, 5Gi for production with qdrant
  size: 1Gi
  # Use existing PVC
  existingClaim: ""

# Centralized database backend (ADR-026)
# When set, the MCP server stores all tokens / sessions / app passwords in
# a shared SQL database instead of a local SQLite file. Required for HA
# deployments with replicaCount > 1 so pods can be stateless.
#
# Bring-your-own DB — this chart does NOT provision Postgres. Use CNPG,
# RDS, your existing Postgres sub-chart, etc.
#
# Encryption is unchanged: TOKEN_ENCRYPTION_KEY is still required and
# applied in Python; the database only sees ciphertext.
#
# Driver: use psycopg3 (`postgresql+psycopg://`). Deck #183 added a
# procrastinate-based ingest queue that requires psycopg3, so the deployment
# standardizes on a single Postgres driver — set DATABASE_URL to a
# `postgresql+psycopg://` URL (a bare `postgresql://` or legacy
# `postgresql+asyncpg://` still works for the app's own engine during the
# transition, but psycopg3 is the target).
database:
  # Inline URL (DO NOT USE in production — credentials end up in plaintext).
  # Useful for local dev or quick experiments. Prefer existingSecret.
  url: ""
  # Reference an existing Secret holding the SQLAlchemy URL. Recommended.
  # The Secret must contain the key named below with a value like:
  #   postgresql+psycopg://user:password@host:5432/dbname
  existingSecret: ""
  existingSecretKey: "DATABASE_URL"

  # TLS for the Postgres backend is configured INSIDE the DATABASE_URL itself
  # (ADR-026, Model A) — the server passes the URL through verbatim and libpq
  # reads the `sslmode` query param directly. Examples:
  #   ...?sslmode=require                       # encrypt, no cert verification
  #   ...?sslmode=verify-full&sslrootcert=/path # verify against a private CA
  # Omitting `sslmode` leaves libpq's default (`prefer`). There are no longer any
  # database.verifySsl / database.caBundle chart values (removed in chart
  # 0.93.0; the app dropped DATABASE_VERIFY_SSL / DATABASE_CA_BUNDLE in
  # nextcloud-mcp-server 0.129.5). To use a private CA, mount it yourself via
  # `volumes`/`volumeMounts` and point `sslrootcert=` at the mounted path in the
  # DATABASE_URL Secret.

  # SQLAlchemy connection pool sizing (ADR-026). Max per-pod
  # connections = poolSize + maxOverflow. With many replicas this can
  # blow past managed-Postgres `max_connections=100`; tune down for
  # large fleets. Empty = server default (10 / 20).
  poolSize: ""
  maxOverflow: ""

# MCP server configuration
mcp:
  # Transport mode (default: streamable-http for SSE)
  transport: "streamable-http"
  # Port for MCP server (both basic auth and OAuth modes)
  port: 8000
  # Additional command-line arguments to pass to nextcloud-mcp-server
  # Example: ["--log-level", "debug", "--enable-app", "notes"]
  extraArgs: []

# Document processing configuration (optional)
documentProcessing:
  # Enable document processing (PDF, DOCX, images, etc.)
  enabled: false
  # Default processor: unstructured, tesseract, or custom
  defaultProcessor: "unstructured"
  # Progress reporting interval in seconds
  progressInterval: 10

  # Unstructured.io processor
  unstructured:
    enabled: false
    # Unstructured API endpoint
    apiUrl: "http://unstructured:8000"
    # Request timeout in seconds
    timeout: 120
    # Parsing strategy: auto, fast, or hi_res
    strategy: "auto"
    # OCR languages (comma-separated ISO 639-3 codes)
    languages: "eng,deu"

  # Tesseract processor (local OCR)
  tesseract:
    enabled: false
    # Path to tesseract executable (optional, auto-detected if in PATH)
    cmd: ""
    # OCR language (e.g., eng, deu, eng+deu for multiple)
    lang: "eng"

  # Custom processor
  custom:
    enabled: false
    # Unique name for your processor
    name: "my_ocr"
    # Custom processor API endpoint
    url: ""
    # Optional API key for authentication
    apiKey: ""
    # Request timeout in seconds
    timeout: 60
    # Comma-separated MIME types your processor supports
    types: "application/pdf,image/jpeg,image/png"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Observability Configuration
observability:
  # Prometheus metrics
  metrics:
    enabled: true
    port: 9090
    path: /metrics

  # OpenTelemetry tracing
  tracing:
    enabled: false
    endpoint: ""  # e.g., "http://opentelemetry-collector:4317"
    serviceName: "nextcloud-mcp-server"
    samplingRate: 1.0
    # OTEL sampler strategy (OTEL_TRACES_SAMPLER): always_on, always_off,
    # traceidratio, parentbased_always_on, parentbased_traceidratio, etc.
    # When using a *ratio sampler, samplingRate above is passed as its arg.
    sampler: "always_on"
    # Verify TLS to the OTLP endpoint (OTEL_EXPORTER_VERIFY_SSL).
    verifySsl: false

  # Continuous profiling (Pyroscope). Opt-in. When enabled, the API and ingest
  # worker push CPU/wall profiles to `serverAddress` — a Pyroscope-compatible
  # ingest endpoint such as Grafana Alloy's pyroscope.receive_http (which
  # forwards to Pyroscope). Requires appVersion >= 0.137.0 (the image ships the
  # pyroscope-io SDK via the `observability` extra). Maps to PYROSCOPE_ENABLED /
  # PYROSCOPE_SERVER_ADDRESS; a load/config failure degrades to a warning rather
  # than crashing startup.
  profiling:
    enabled: false
    serverAddress: ""  # e.g., "http://alloy.alloy.svc.cluster.local:4041"

  # Logging configuration
  logging:
    format: json  # "json" or "text"
    level: INFO
    includeTraceContext: true

# Prometheus ServiceMonitor (requires Prometheus Operator)
# When ingest.splitWorker is true, this same toggle also renders a second
# ServiceMonitor (+ headless Service) for the ingest-worker pods, reusing the
# interval/scrapeTimeout/labels below.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  # Additional labels for ServiceMonitor (e.g., for Prometheus selector)
  # Example: { prometheus: kube-prometheus }

# Prometheus alert rules (requires Prometheus Operator)
prometheusRule:
  enabled: false
  labels: {}
  # Additional labels for PrometheusRule (e.g., for Prometheus selector)
  # Example: { prometheus: kube-prometheus }

# Grafana dashboards (requires Grafana with sidecar enabled)
dashboards:
  # Enable automatic dashboard provisioning via ConfigMap
  enabled: false
  # Grafana folder name where dashboards will be imported
  # The grafana-sidecar looks for ConfigMaps with label "grafana_dashboard: 1"
  # and reads the folder name from annotation "grafana_folder" (supports spaces)
  grafanaFolder: "Nextcloud MCP"
  # Additional labels for dashboard ConfigMap
  # These will be added alongside the required "grafana_dashboard: 1" label
  labels: {}
  # Additional annotations for dashboard ConfigMap
  annotations: {}

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: nextcloud-mcp-tls
  #    hosts:
  #      - mcp.example.com

resources:
  # We recommend setting resource requests and limits
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# PodDisruptionBudget for the API (backend) Deployment. Two patterns,
# depending on the `strategy` above:
#
# - minAvailable: 1 (with the default Recreate strategy) HARD-pins the single
#   replica: it stops ALL voluntary disruptions — Karpenter consolidation
#   ("Evicted pod: Underutilized") and node drains — from evicting the only API
#   pod. On a 1-replica Deployment this yields ALLOWED DISRUPTIONS = 0, which
#   also blocks routine node drains AND `helm upgrade` (Recreate terminates the
#   old pod first, and the PDB holds that eviction). Use only where churn
#   protection outweighs ever consolidating the node.
#
# - maxUnavailable: 1 (paired with a RollingUpdate surge strategy:
#   maxUnavailable: 0 / maxSurge: 1) is the graceful alternative: it ALLOWS the
#   eviction so node drains/consolidation proceed, while the surge strategy
#   brings the replacement pod up Ready before the old one is removed on a
#   rollout — so a `cordon + rollout restart` migration keeps ≥1 pod serving.
#   (A raw `kubectl drain` evicts before rescheduling, so prefer rollout-driven
#   moves for zero-gap; the PDB just stops the drain from being blocked.)
#
# Opt-in (disabled by default). Set exactly one of minAvailable / maxUnavailable,
# and use a positive integer — `0` is treated as unset by the template guards
# (so maxUnavailable: 0 is not a valid "block everything" value; use
# minAvailable for that).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Liveness probe configuration
# Checks if the application process is running
livenessProbe:
  httpGet:
    path: /health/live
    port: http
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
# Checks if the application is ready to serve traffic
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Application settings (dynaconf `settings.toml`). The chart ALWAYS generates a
# settings.toml from the non-secret config values (templates/_settings.tpl),
# renders a `<fullname>-settings` ConfigMap, mounts it read-only at `mountPath` on
# BOTH the api and ingest-worker pods, and sets NEXTCLOUD_MCP_SETTINGS_FILE — so
# non-secret config is file-driven and only secrets + per-pod/auth-coupled vars
# are injected as env. dynaconf precedence is env var > settings.toml > app
# defaults, so env/extraEnv still overrides anything in the file. SECRETS must NOT
# go here — this lands in a plaintext ConfigMap.
settings:
  # Raw TOML appended verbatim after the generated [default] body (escape-hatch
  # for keys the chart doesn't model). It is already inside [default], so add
  # bare keys:
  #   content: |
  #     SOME_UNMODELLED_KEY = "x"
  content: ""
  mountPath: /config

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Init containers
initContainers: []

# Additional environment variables
extraEnv: []
# - name: CUSTOM_VAR
#   value: "custom_value"

# Additional environment variables from ConfigMaps or Secrets
extraEnvFrom: []
# - configMapRef:
#     name: my-configmap
# - secretRef:
#     name: my-secret

# Webhook delivery authentication (ADR-010, GHSA-8vh3-g2qg-2h2c).
#
# As of app version 0.117.2 a webhook secret is REQUIRED to enable webhooks.
# When configured, the MCP server mounts the /webhooks/nextcloud receiver
# route, registers webhooks with Nextcloud using
# `Authorization: Bearer <secret>`, and validates that header on every
# delivery. When unset, the receiver route is NOT mounted, the receiver
# refuses any request that reaches it (503), and registration refuses to
# create webhooks — vector sync then falls back to the periodic polling
# scanner. Leave this block empty to keep webhooks disabled.
#
# These env vars are injected only into the API pod (the receiver route and
# registrar live there); the ingest worker drains the queue and never handles
# webhooks.
webhooks:
  # Inline webhook secret (WEBHOOK_SECRET). MUST be at least 16 characters
  # (the server fails fast at startup otherwise). Ignored when
  # existingSecret is set. Generate with e.g.:
  #   python -c "import secrets; print(secrets.token_urlsafe(32))"
  secret: ""
  # Reference an existing Secret holding the webhook secret instead of
  # having the chart create one. Must contain the key named in secretKey.
  # Example:
  #   kubectl create secret generic my-webhook-secret \
  #     --from-literal=webhook-secret=$(python -c "import secrets; print(secrets.token_urlsafe(32))")
  existingSecret: ""
  # Key in the Secret that holds the webhook secret.
  secretKey: "webhook-secret"
  # Internal URL override for webhook registration (WEBHOOK_INTERNAL_URL).
  # Highest-priority source for the callback URL registered with Nextcloud,
  # above nextcloud.mcpServerUrl and docker autodetection. Set this when
  # Nextcloud must reach the MCP server at a cluster-internal Service URL
  # that differs from the public mcpServerUrl.
  # Example: http://my-release-nextcloud-mcp-server:8000
  internalUrl: ""

# Semantic Search Configuration
# Enable semantic search with BM25 hybrid search and background synchronization
# of Nextcloud content into vector database
semanticSearch:
  # Enable semantic search and background vector synchronization
  enabled: false
  # Scan interval in seconds (how often to check for changes)
  scanInterval: 3600
  # Number of concurrent processor workers
  processorWorkers: 3
  # Maximum queue size for documents pending indexing
  queueMaxSize: 10000
  # Comma-separated Nextcloud tag names to exclude from indexing (EXCLUDED_TAGS).
  # Documents carrying any of these tags are skipped by the vector sync.
  excludedTags: ""
  # Nextcloud system tag marking files for HYBRID indexing — dense embeddings +
  # BM25 sparse (VECTOR_SYNC_TAG). Rename only if you use a different include tag;
  # must be non-empty.
  vectorTag: "vector-index"
  # Nextcloud system tag marking files for KEYWORD-ONLY indexing — BM25 sparse,
  # no dense embedding (VECTOR_SYNC_KEYWORD_TAG). Files carrying it are indexed
  # sparse-only into the same collection; vectorTag (hybrid) wins when a file
  # carries both. Set to "" to disable keyword-only indexing entirely.
  keywordTag: "keyword-index"

# Ingest queue backend (Deck #183).
#
# Controls HOW changed documents are processed into the vector store, NOT
# whether (that's semanticSearch.enabled). procrastinate is strictly opt-in:
#
#   splitWorker: false (default)
#     The API pod processes documents IN-PROCESS via anyio task groups
#     (INGEST_QUEUE=memory). No procrastinate, no separate worker — even when a
#     PostgreSQL database backend is configured. This is the safe default; a
#     Postgres DATABASE_URL alone never spins up a background queue.
#
#   splitWorker: true
#     Ingest is split across a service boundary: the API pod (MCP_ROLE=api)
#     defers one procrastinate job per changed document into Postgres, and a
#     dedicated worker Deployment (MCP_ROLE=worker) drains the queue
#     (fetch → chunk → embed → upsert Qdrant). Requires a PostgreSQL
#     database.url / database.existingSecret (procrastinate is Postgres-only;
#     the server fails loudly otherwise).
ingest:
  # Split ingest into a procrastinate Postgres queue + worker Deployment.
  # Leave false to keep document processing in-process (anyio task groups).
  splitWorker: false
  # LISTEN/NOTIFY for near-instant job pickup (app default). Set false to run the
  # worker poll-only when DATABASE_URL routes through a transaction-mode pooler
  # (PgBouncer), which drops the LISTEN registration on backend checkin. Emitted
  # into the generated settings.toml (INGEST_LISTEN_NOTIFY).
  listenNotify: true
  # Settings for the worker Deployment (only rendered when splitWorker=true).
  worker:
    # Static replica count. For scale-to-zero on queue depth, apply a KEDA
    # ScaledObject targeting the "<release>-worker" Deployment (handled by the
    # platform layer) and KEDA manages replicas instead.
    replicaCount: 1
    # Max concurrent jobs per worker (CLI -c). Empty → the server default
    # (VECTOR_SYNC_PROCESSOR_WORKERS).
    concurrency: ""
    # Resource requests/limits for the worker container. Non-empty by default:
    # an empty block is rejected outright by a namespace ResourceQuota that
    # tracks cpu/memory ("must specify requests.cpu/limits.cpu/…"), which leaves
    # the worker Deployment stuck at 0 replicas (FailedCreate). The worker
    # offloads OCR (Mistral API) and embeddings (gateway API) over the network,
    # so it is mostly IO-bound; the memory headroom covers PyMuPDF parsing of
    # large PDFs. Override per environment as needed.
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    # Per-tier worker fleets (Deck #324). Empty (default) → a SINGLE
    # "<release>-worker" Deployment running `worker` with no --tier, which drains
    # every ingest tier queue (fast/structured/ocr) — today's behaviour.
    #
    # When non-empty, render one Deployment per entry
    # ("<release>-worker-<name>", `worker --tier <name>`) so the tiers scale
    # independently behind their own KEDA ScaledObjects (platform layer, keyed on
    # the per-tier queue depth). Each entry overrides the worker settings above
    # for that tier, falling back to them when a field is omitted:
    #   - name        (required) — tier: fast | structured | ocr. Becomes the
    #                  Deployment name suffix and the `worker --tier` argument.
    #   - replicaCount (optional) — static floor (KEDA owns it once a ScaledObject
    #                  targets the Deployment); defaults to worker.replicaCount.
    #   - concurrency  (optional) — per-tier CLI -c; defaults to worker.concurrency.
    #   - resources    (optional) — per-tier requests/limits; defaults to
    #                  worker.resources. Size per tier: fast is CPU-light,
    #                  structured (docling, later) wants more memory, ocr is
    #                  network-light.
    #   - nodeSelector / tolerations / affinity (optional) — default to worker.*.
    #
    # Example:
    #   tiers:
    #     - name: fast
    #       resources: { requests: { cpu: 250m, memory: 1Gi }, limits: { cpu: "1", memory: 2Gi } }
    #     - name: structured
    #       resources: { requests: { cpu: 250m, memory: 2Gi }, limits: { cpu: "1", memory: 4Gi } }
    #     - name: ocr             # OCR (gateway or direct Mistral; configured below)
    #       concurrency: "2"
    #       resources: { requests: { cpu: 100m, memory: 512Mi }, limits: { cpu: 500m, memory: 1Gi } }
    # Valid tier names: fast | structured | ocr.
    tiers: []

# Document Chunking Configuration
# Controls how documents are split into chunks before embedding
# Only relevant when semanticSearch.enabled is true
documentChunking:
  # Number of words per chunk (default: 512)
  # Smaller chunks (256-384): Better for precise searches, more chunks to store
  # Medium chunks (512-768): Balanced approach (recommended for most use cases)
  # Larger chunks (1024+): Better for context, less precise matching
  chunkSize: 512
  # Number of overlapping words between chunks (default: 50)
  # Recommended: 10-20% of chunkSize for context preservation across boundaries
  # Must be less than chunkSize
  chunkOverlap: 50

# Tiered PDF extraction + OCR pipeline
# Runs on the semantic-search / vector-ingestion path (applies whenever
# semanticSearch.enabled is true and a PDF is indexed). This is SEPARATE from
# the legacy `documentProcessing` block above (the unstructured/tesseract/custom
# processors gated by ENABLE_DOCUMENT_PROCESSING) — enabling OCR here does NOT
# require documentProcessing.enabled.
documentPipeline:
  # Fast-tier PDF engine: "pypdfium2" (default, permissive license) or
  # "pymupdf" (deprecated AGPL rollback escape hatch).
  tier1Engine: "pypdfium2"
  # Tier-0 classifier. Records classification metrics (recommended_tier,
  # text-quality) on the tiered path. Default on.
  classifyEnabled: true
  # Tier-0 glyph-corruption trigger. When the fast (pypdfium2) extraction's
  # doc-level C0-control-char ratio exceeds this, the text layer is treated as
  # glyph-corrupt (a broken /ToUnicode mapping leaking raw glyph codes) and the
  # doc escalates fast->structured (pymupdf re-extracts it correctly — no OCR).
  # Independent of ocr.enabled: structured is free + in-cluster. Set 0 to disable.
  # Clean docs sit ~0; affected PDFs measured ~1-11%.
  glyphCorruptionRatio: 0.02
  # PDF parse tuning (generic).
  # Wall-clock timeout for a single PDF parse, in seconds.
  parseTimeoutSeconds: 120
  # RLIMIT_AS memory cap (MB) applied in the parse subprocess. Keep below the
  # pod memory limit.
  parseMemLimitMb: 1536
  # Pages per pypdfium2 extraction window. PDFium retains parsed page objects for
  # the document's lifetime (~0.5 MB/page) and page.close() does not give them
  # back, so extracting a large document in one open scales peak RSS with page
  # count (a 4003-page file cost ~1900 MB). Re-opening every N pages caps that at
  # one window's worth, with byte-identical output. 0 disables windowing
  # (single open, pre-0.141 behaviour).
  parsePageWindow: 100
  # Max concurrent isolated parse subprocesses. anyio defaults this to
  # os.cpu_count(), which is decoupled from both worker concurrency and the pod
  # memory limit — on an 8-core node that permits 8 x parseMemLimitMb of address
  # space inside the pod. Bound it explicitly; raise only with headroom to spare.
  parseProcessSlots: 2
  # Max vector graphics per PDF before the parser bails (pymupdf path).
  pdfGraphicsLimit: 1000
  # Pre-parse size cap (MB): PDFs larger than this fail fast with reason
  # "oversize" instead of burning the parse/OCR timeout to 0 chars on a
  # pathological file. 0 disables the guard.
  #
  # Since app 0.141.0 this is a DISK argument, not a memory one: the download is
  # streamed to a spool file (one chunk resident) and extraction is windowed
  # (O(window), independent of file size and page count). Size it against the
  # spool volume: roughly spoolVolumeSize / worker concurrency.
  maxPdfSizeMb: 50
  # Stream ingest downloads to a spool file instead of buffering the whole
  # response in memory. Buffering held the entire document (a 1040 MB file cost
  # ~1.1 GB resident before a page was read); streaming keeps that at one chunk.
  # Set false ONLY as an escape hatch from a streaming-specific bug -- the
  # buffered path is the higher-memory one, so it is not a safe fallback under
  # memory pressure.
  streamDownloadEnabled: true
  # Directory for ingest spool files. Pinned explicitly rather than left to the
  # system temp dir: the worker's startup sweep for orphaned spools only scans
  # this path, so an implicit value that drifts (e.g. via TMPDIR) would leave
  # leaked documents uncollected.
  #
  # /tmp is the only writable volume this chart mounts, and the pods run with
  # readOnlyRootFilesystem: true. /tmp stays mounted there regardless of this
  # value -- the app also uses the system temp dir for pdf-image extraction,
  # bbox/highlight scratch and the ephemeral token DB -- so pointing spoolDir
  # elsewhere is a BRING-YOUR-OWN-VOLUME feature: supply a volume + volumeMount
  # covering it via .Values.volumes / .Values.volumeMounts. The chart fails at
  # template time if you set a path nothing mounts, rather than letting every
  # spool write fail at runtime.
  spoolDir: /tmp
  # Size limit for the worker's /tmp emptyDir, which backs the spool directory.
  # That emptyDir lives on the node's root filesystem, shared with container
  # images, logs and other pods' scratch, so an unbounded spool competes with
  # the kubelet itself. Must exceed (worker concurrency x maxPdfSizeMb) with
  # headroom; raise it in the same change that raises maxPdfSizeMb.
  # Empty string leaves the volume unbounded (previous behaviour).
  spoolSizeLimit: 2Gi
  # OCR escalation for scanned / no-text-layer PDFs. A single configurable OCR
  # tier: pick the backend (gateway vs direct Mistral) and model below. Off by
  # default; when off the structured tier is terminal.
  ocr:
    # Enable the OCR tier.
    enabled: false
    # OCR backend: "auto" | "gateway" | "mistral" | "none".
    #   mistral - Call the Mistral OCR API directly from the pod. Enable the
    #             top-level `mistral` block below so MISTRAL_API_KEY (and
    #             optionally MISTRAL_BASE_URL) are provided. Works for any
    #             self-hoster.
    #   gateway - Route OCR through an Astrolabe Cloud–style model gateway
    #             (no provider keys in the pod). The gateway URL + M2M creds
    #             (EMBEDDING_GATEWAY_URL / _TOKEN_URL / _CLIENT_ID /
    #             _CLIENT_SECRET / _SCOPE) are intentionally NOT part of this
    #             public chart — supply them from your private overlay via
    #             `extraEnv` (see the extraEnv example below).
    #   auto    - Prefer gateway if EMBEDDING_GATEWAY_URL is set, else Mistral
    #             if MISTRAL_API_KEY is set, else OCR is disabled.
    #   none    - OCR disabled.
    # Note: OCR backend selection is independent of the embedding provider —
    # you can embed via Ollama/OpenAI and OCR via gateway/Mistral.
    provider: "auto"
    # Provider-namespaced OCR model id. The gateway routes on the "<provider>/"
    # prefix (so it can serve Mistral, surya, lightonocr, …); the direct Mistral
    # backend strips it. e.g. "mistral/mistral-ocr-latest" or "surya/surya-ocr-2"
    # (surya is reached via the gateway — set provider to gateway/auto + supply
    # EMBEDDING_GATEWAY_URL + M2M creds from your private extraEnv overlay).
    model: "mistral/mistral-ocr-latest"
    # OCR backend request timeout (seconds). Slow scanned newspapers can take
    # 20-60s; raise/lower per deployment.
    timeoutSeconds: 180
    # OCR execution mode: "sync" (default) transcribes inline; "batch" routes to
    # the gateway's async Batch OCR job (~50% cheaper, minutes-hours latency) for
    # large-corpus backfill. "batch" REQUIRES a gateway (EMBEDDING_GATEWAY_URL,
    # supplied via extraEnv) and the procrastinate ingest path — the server
    # raises at startup otherwise rather than silently downgrading to sync.
    mode: "sync"
    # Batch mode only (ignored when mode=sync): seconds between batch-job polls
    # (the procrastinate re-enqueue delay). Keep well above a few seconds.
    batchPollSeconds: 120
    # Batch mode only (ignored when mode=sync): hard deadline (seconds from
    # submit) after which a still-pending batch job is abandoned and the document
    # marked parse-failed. Default matches the gateway's 24h Batch timeout.
    batchMaxWaitSeconds: 86400
    # Escalation tuning — when does a PDF page get sent to OCR instead of the
    # fast text tier. A page is OCR-worthy if it is near-empty
    # (< minPageChars extracted chars) OR its text quality is junk
    # (< minTextQuality) OR (when detectScanned) it is mostly a raster image;
    # the whole document escalates once the OCR-worthy page fraction reaches
    # pageFraction. Defaults mirror the MCP server's own defaults
    # (nextcloud_mcp_server/config.py).
    # Minimum extracted-text quality score [0,1] below which a page is junk.
    minTextQuality: 0.5
    # Fraction of sampled pages [0,1] flagged OCR-worthy before the whole doc
    # escalates to OCR.
    pageFraction: 0.5
    # A page with fewer than this many extracted chars counts as near-empty.
    minPageChars: 16
    # Run raster-image analysis to detect scanned pages (only active when OCR
    # is enabled). Off makes escalation rely on char-count + text-quality only.
    detectScanned: true

# Qdrant Vector Database Configuration
# Four deployment modes available:
# 1. Local In-Memory: Fast, ephemeral, zero-config (mode: "memory")
# 2. Local Persistent: File-based, survives restarts (mode: "persistent")
# 3. Sidecar: Qdrant container in the same pod, accessed via localhost (mode: "sidecar")
# 4. Network: Dedicated Qdrant service, production-ready (mode: "network")
qdrant:
  # Qdrant mode: "memory", "persistent", "sidecar", or "network"
  # - memory: In-memory storage (:memory:) - default, zero config, data lost on restart
  # - persistent: Local file storage - data persists across restarts, suitable for small/medium deployments
  # - sidecar: Qdrant runs as a sidecar container, accessed via localhost (single-pod deployments)
  # - network: Dedicated Qdrant service (see networkMode below)
  mode: "memory"

  # Collection name for vector data
  collection: "nextcloud_content"

  # Local persistent mode configuration (only used when mode: "persistent")
  localPersistence:
    # Enable persistent volume for local Qdrant data
    enabled: true
    # Storage class (leave empty for default)
    storageClass: ""
    accessMode: ReadWriteOnce
    # Size for local Qdrant storage
    size: 1Gi
    # Path where Qdrant data is stored (relative to /app/data)
    # Default: /app/data/qdrant
    dataPath: "/app/data/qdrant"
    # Use existing PVC
    existingClaim: ""

  # Sidecar mode configuration (only used when mode: "sidecar")
  # Runs Qdrant as a sidecar container in the same pod. The MCP server
  # connects via localhost:6333. Sidecar data is automatically persisted
  # via the dataStorage volume (PVC mounted at /qdrant/storage subPath qdrant).
  sidecar:
    image:
      repository: docker.io/qdrant/qdrant
      # renovate: datasource=docker depName=docker.io/qdrant/qdrant
      tag: "v1.18.3"
      pullPolicy: IfNotPresent
    # Resources for the qdrant sidecar
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    # Optional API key for sidecar authentication (rarely needed since
    # only the same-pod MCP server can reach it)
    apiKey: ""
    # Use existing secret for API key
    existingSecret: ""
    secretKey: "api-key"
    # Security context for the qdrant sidecar container
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  # Network mode configuration (only used when mode: "network")
  networkMode:
    # Deploy Qdrant as a subchart (if true) or use external Qdrant (if false)
    deploySubchart: false
    # External Qdrant URL (used when deploySubchart: false)
    # Example: "http://qdrant.default.svc.cluster.local:6333"
    externalUrl: ""
    # Optional API key for Qdrant authentication
    apiKey: ""
    # Use existing secret for API key
    existingSecret: ""
    secretKey: "api-key"

  # Qdrant subchart configuration (only used when mode: "network" and networkMode.deploySubchart: true)
  # All values are passed through to the qdrant/qdrant chart.
  # The Qdrant image tag is intentionally not set here so the subchart's
  # appVersion (managed by upstream and tracked via Renovate against
  # Chart.yaml dependencies) is used.
  # See https://github.com/qdrant/qdrant-helm for full configuration options.
  subchart:
    # Number of Qdrant replicas
    replicaCount: 1
    config:
      cluster:
        # Enable distributed cluster mode
        enabled: false
    # Persistent storage for vector data
    persistence:
      size: 10Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
    # Resource limits and requests
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# Ollama Embedding Service
# Deployed as a subchart when enabled. All values are passed through to the ollama/ollama chart.
# See https://github.com/otwld/ollama-helm for full configuration options.
ollama:
  # Enable Ollama subchart deployment
  # Set to true to deploy Ollama as a subchart, or false to use an external Ollama instance
  enabled: false
  # External Ollama URL (use this if you have Ollama deployed elsewhere)
  # When set, use enabled: false to prevent deploying the subchart
  # Example: "http://ollama.default.svc.cluster.local:11434"
  url: ""
  # Embedding model to use
  embeddingModel: "nomic-embed-text"
  # Verify SSL certificates when connecting to Ollama
  verifySsl: true
  # Number of Ollama replicas (only used when subchart is deployed)
  replicaCount: 1
  # Ollama configuration (only used when subchart is deployed)
  ollama:
    # Models to automatically pull on startup
    models:
      pull:
        - nomic-embed-text
  # Persistent storage for models (only used when subchart is deployed)
  persistentVolume:
    enabled: true
    size: 20Gi
    storageClass: ""
  # Resource limits and requests (only used when subchart is deployed)
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# OpenAI-compatible Embedding Provider
# Alternative to Ollama for embedding generation. Can be used with OpenAI or any compatible API.
openai:
  # Enable OpenAI embedding provider
  enabled: false
  # OpenAI API key (only used if existingSecret is not set)
  apiKey: ""
  # Name of existing secret containing the API key
  existingSecret: ""
  # Key in the secret that contains the API key
  secretKey: "api-key"
  # Optional custom API endpoint (e.g., for Azure OpenAI or local compatible services)
  baseUrl: ""

# Mistral Embedding Provider (first-class — distinct from OpenAI compat)
# `nextcloud_mcp_server.providers.mistral` is a first-class provider in the
# upstream server's provider registry; selection priority is
# Bedrock → OpenAI → Mistral → Ollama → Simple. MISTRAL_API_KEY alone is
# enough to enable it; embeddingModel defaults to "mistral-embed".
# Prefer this block over routing Mistral through `openai.baseUrl` — that
# compat path requires extra env vars and isn't what the upstream tests
# against.
mistral:
  # Enable Mistral embedding provider
  enabled: false
  # Mistral API key (only used if existingSecret is not set)
  apiKey: ""
  # Name of existing secret containing the API key
  existingSecret: ""
  # Key in the secret that contains the API key
  secretKey: "api-key"
  # Embedding model to use. Defaults to mistral-embed (1024 dimensions).
  # See https://docs.mistral.ai/capabilities/embeddings/ for the up-to-
  # date list. The MCP server's `MISTRAL_EMBEDDING_DIMENSIONS` map only
  # lists known models — pin to one of those to avoid the simple
  # fallback dimension.
  embeddingModel: "mistral-embed"
  # Optional custom API endpoint. Leave empty to use Mistral's default
  # (https://api.mistral.ai/v1).
  baseUrl: ""
