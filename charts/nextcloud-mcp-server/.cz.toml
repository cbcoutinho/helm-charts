[tool.commitizen]
name = "cz_conventional_commits"
version = "0.60.1"
tag_format = "nextcloud-mcp-server-$version"
version_scheme = "semver"
update_changelog_on_bump = true
major_version_zero = true

# Update chart version only (NOT appVersion - Renovate handles that)
version_files = [
    "Chart.yaml:^version:"
]

# All conventional commits are chart-related in this dedicated repo
[tool.commitizen.customize]
changelog_pattern = "^(feat|fix|docs|refactor|perf|test|build|ci|chore)(\\(.*\\))?(!)?:"
schema_pattern = "^(feat|fix|docs|refactor|perf|test|build|ci|chore)(\\(.*\\))?(!)?:\\s.+"
message_template = "{{change_type}}(helm): {{message}}"
