apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nextcloud-mcp-server.fullname" . }}
  labels:
    {{- include "nextcloud-mcp-server.labels" . | nindent 4 }}
spec:
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nextcloud-mcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/configmap-settings: {{ include (print $.Template.BasePath "/settings-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nextcloud-mcp-server.labels" . | nindent 8 }}
        # Distinguish the API workload from the ingest-worker so the Service /
        # ServiceMonitor scrape only the API pods — the worker has its own
        # Service + ServiceMonitor (Deck #310).
        app.kubernetes.io/component: api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nextcloud-mcp-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ include "nextcloud-mcp-server.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--transport"
            - "{{ .Values.mcp.transport }}"
            {{- if or (eq .Values.auth.mode "oauth") (eq .Values.auth.mode "login-flow") }}
            - "--oauth"
            {{- end }}
            {{- if eq .Values.auth.mode "oauth" }}
            - "--oauth-token-type"
            - "{{ .Values.auth.oauth.tokenType }}"
            {{- end }}
            {{- with .Values.mcp.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ include "nextcloud-mcp-server.port" . }}
              protocol: TCP
            {{- if .Values.observability.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
{{- include "nextcloud-mcp-server.containerEnv" . }}
            # Webhook delivery authentication (ADR-010, GHSA-8vh3-g2qg-2h2c).
            # API-only: the receiver route + registrar live in the API pod;
            # the ingest worker drains the queue and never handles webhooks.
            # When set, the server mounts /webhooks/nextcloud and registers
            # authenticated webhooks; when unset webhooks are disabled and
            # vector sync falls back to the polling scanner.
            {{- if or .Values.webhooks.secret .Values.webhooks.existingSecret }}
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud-mcp-server.webhookSecretName" . }}
                  key: {{ .Values.webhooks.secretKey }}
            {{- end }}
            {{- with .Values.webhooks.internalUrl }}
            # Internal callback URL registered with Nextcloud (wins over
            # NEXTCLOUD_MCP_SERVER_URL and docker autodetection).
            - name: WEBHOOK_INTERNAL_URL
              value: {{ . | quote }}
            {{- end }}
            # Ingest queue backend (Deck #183). procrastinate is opt-in via
            # ingest.splitWorker; the default (memory) keeps document processing
            # in-process (anyio task groups), so a Postgres DATABASE_URL alone
            # never starts a background queue/worker.
            - name: INGEST_QUEUE
              value: {{ ternary "postgres" "memory" .Values.ingest.splitWorker | quote }}
            {{- if .Values.ingest.splitWorker }}
            - name: MCP_ROLE
              value: "api"
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if or (and (eq .Values.auth.mode "oauth") .Values.auth.oauth.persistence.enabled) (and (eq .Values.auth.mode "login-flow") .Values.auth.loginFlow.persistence.enabled) }}
            - name: oauth-storage
              mountPath: /app/.oauth
            {{- end }}
            - name: data-storage
              mountPath: /app/data
            {{- if .Values.database.caBundleSecret.name }}
            # Mount the Secret-provided CA bundle at the path
            # DATABASE_CA_BUNDLE points at, with subPath so only the
            # bundle file lands in the mount.
            - name: database-ca-bundle
              mountPath: {{ .Values.database.caBundleSecret.mountPath | quote }}
              subPath: {{ .Values.database.caBundleSecret.key | quote }}
              readOnly: true
            {{- end }}
            {{- include "nextcloud-mcp-server.settingsVolumeMount" . | nindent 12 }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if eq .Values.qdrant.mode "sidecar" }}
        - name: qdrant
          image: "{{ .Values.qdrant.sidecar.image.repository }}:{{ .Values.qdrant.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.sidecar.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.qdrant.sidecar.securityContext | nindent 12 }}
          ports:
            - name: qdrant-http
              containerPort: 6333
              protocol: TCP
            - name: qdrant-grpc
              containerPort: 6334
              protocol: TCP
          {{- if or .Values.qdrant.sidecar.apiKey .Values.qdrant.sidecar.existingSecret }}
          env:
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nextcloud-mcp-server.qdrantSidecarSecretName" . }}
                  key: {{ .Values.qdrant.sidecar.secretKey }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: qdrant-http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.qdrant.sidecar.resources | nindent 12 }}
          volumeMounts:
            - name: data-storage
              mountPath: /qdrant/storage
              subPath: qdrant
            - name: qdrant-snapshots
              mountPath: /qdrant/snapshots
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if or (and (eq .Values.auth.mode "oauth") .Values.auth.oauth.persistence.enabled) (and (eq .Values.auth.mode "login-flow") .Values.auth.loginFlow.persistence.enabled) }}
        - name: oauth-storage
          persistentVolumeClaim:
            claimName: {{ include "nextcloud-mcp-server.oauthPvcName" . }}
        {{- end }}
        - name: data-storage
        {{- if eq (include "nextcloud-mcp-server.dataStorageEnabled" .) "true" }}
          persistentVolumeClaim:
            claimName: {{ include "nextcloud-mcp-server.dataStoragePvcName" . }}
        {{- else }}
          emptyDir: {}
        {{- end }}
        {{- if eq .Values.qdrant.mode "sidecar" }}
        - name: qdrant-snapshots
          emptyDir: {}
        {{- end }}
        {{- if .Values.database.caBundleSecret.name }}
        - name: database-ca-bundle
          secret:
            secretName: {{ .Values.database.caBundleSecret.name | quote }}
            items:
              - key: {{ .Values.database.caBundleSecret.key | quote }}
                path: {{ .Values.database.caBundleSecret.key | quote }}
        {{- end }}
        {{- include "nextcloud-mcp-server.settingsVolume" . | nindent 8 }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
