{{/*
Generated dynaconf settings.toml for the MCP server (api + ingest-worker pods).
Holds the NON-SECRET, dataclass-backed config that would otherwise be injected as
env (templates/_settings.tpl), plus any operator-supplied .Values.settings.content
appended verbatim. dynaconf precedence is env var > settings.toml > app defaults,
so env/extraEnv still overrides anything here. Mounted read-only at
.Values.settings.mountPath and selected via NEXTCLOUD_MCP_SETTINGS_FILE (set in the
containerEnv helper). The app runs dynaconf in environments mode (env_switcher
MCP_DEPLOYMENT_MODE); the generated body uses a [default] section.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nextcloud-mcp-server.fullname" . }}-settings
  labels:
    {{- include "nextcloud-mcp-server.labels" . | nindent 4 }}
data:
  # `indent 4` (NOT nindent) is intentional — nindent prepends a newline, which
  # would leave a leading blank line in the mounted settings.toml.
  settings.toml: |
{{ include "nextcloud-mcp-server.generatedSettings" . | indent 4 }}
